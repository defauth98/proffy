services:
  postgres:
    image: postgres:16-alpine
    container_name: proffy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: proffy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: docker
    ports:
      - '5432:5432'
    volumes:
      - proffy-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d proffy']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  proffy-postgres-data:
